[book]
title = "Installway"
description = "Single-file Rust installer for Windows — build, sign, and ship .exe installers with an embedded, signed payload."
authors = ["Gaëtan Dezeiraud", "Louis Pinaud"]
language = "en"
src = "src"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/Tooltip-Focus/Installway"
edit-url-template = "https://github.com/Tooltip-Focus/Installway/edit/main/docs/{path}"
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
