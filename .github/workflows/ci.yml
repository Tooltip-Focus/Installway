name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # Global formatting gate (mirrors the .githooks/pre-commit check).
      - name: Format check
        run: cargo fmt --all --check

      # Any warning fails the build (mirrors the .githooks/pre-commit check).
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      # End-to-end: build a keyed toolchain-free kit, pack an installer, verify it.
      - name: Smoke test (toolchain-free pack + --verify)
        shell: pwsh
        run: ./scripts/smoke-test.ps1
